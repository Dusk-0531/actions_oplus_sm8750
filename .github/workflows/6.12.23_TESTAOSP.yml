name: 6.12.23 TEST AOSP OP13 Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-6.12.23
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  KERNEL_TAG: 6.12.23-palaziks-ShiftPorts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache clang cmake curl flex git libelf-dev libssl-dev \
            lld llvm make pahole python3 unzip wget zip zstd

      - name: Prepare source and toolchain
        run: |
          rm -rf kernel_workspace
          mkdir -p kernel_workspace
          cd kernel_workspace

          curl -L https://github.com/palazik/android_kernel_common_oneplus_sm8750/archive/refs/heads/6.12.23_oneplus13_coloros16.zip -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8750-* common
          rm -f common.zip

          aria2c -x16 -s16 -k1M -j16 --retry-wait=5 --max-tries=10 \
            -d /tmp -o clang-r563880c.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz"
          mkdir -p clang-r563880c
          tar -C clang-r563880c -zxf /tmp/clang-r563880c.tar.gz
          rm -f /tmp/clang-r563880c.tar.gz

          mkdir -p build-tools/linux-x86
          curl -L --retry 3 \
            "https://android.googlesource.com/kernel/prebuilts/build-tools/+archive/refs/heads/main/linux-x86.tar.gz" \
            | tar -xz -C build-tools/linux-x86

      - name: Setup Rust toolchain
        run: |
          rustup toolchain install 1.82.0 --profile minimal --component rust-src,rustfmt --no-self-update
          rustup default 1.82.0
          if [ ! -x "$HOME/.cargo/bin/bindgen" ]; then
            cargo install --locked --version 0.71.1 bindgen-cli
          fi

      - name: Apply patches and configure kernel
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/mrcxlinux/kernel_patches.git
          git clone --depth=1 https://github.com/palazik/kernel_patches.git wildkernels_patches

          cd common
          if [ -f "$GITHUB_WORKSPACE/patches/bore.patch" ]; then
            patch -p1 --forward < "$GITHUB_WORKSPACE/patches/bore.patch" || true
          fi

          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          sed -i 's/check_defconfig//' build.config.gki
          sed -i 's/${scm_version}//' scripts/setlocalversion
          sed -i 's/-4k/-palaziks-ShiftPorts/g' "$DEFCONFIG"

          {
            echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y"
            echo "CONFIG_HEADERS_INSTALL=n"
            echo "CONFIG_LOCALVERSION_AUTO=n"
            echo "CONFIG_WIREGUARD=y"
            echo "CONFIG_BBG=y"
          } >> "$DEFCONFIG"

          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: Build kernel
        run: |
          WORKDIR="$PWD"
          export PATH="$WORKDIR/kernel_workspace/clang-r563880c/bin:$WORKDIR/kernel_workspace/build-tools/linux-x86/bin:$HOME/.cargo/bin:$PATH"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang-r563880c/lib"

          mkdir -p "$GITHUB_WORKSPACE/kout" "$GITHUB_WORKSPACE/ldcache_6.12.23"
          cd kernel_workspace/common

          cat > ld-wrapper <<'SH'
          #!/bin/bash
          ld.lld "$@" --thinlto-cache-dir=$GITHUB_WORKSPACE/ldcache_6.12.23 --thinlto-jobs=$(($(nproc --all) / 2))
          SH
          chmod +x ld-wrapper

          make -j"$(nproc --all)" LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="$PWD/ld-wrapper" HOSTLD="$PWD/ld-wrapper" O="$GITHUB_WORKSPACE/kout" gki_defconfig

          make -j"$(nproc --all)" LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="$PWD/ld-wrapper" HOSTLD="$PWD/ld-wrapper" O="$GITHUB_WORKSPACE/kout" Image

      - name: Package AnyKernel3
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/palazik/AnyKernel3
          rm -rf AnyKernel3/.git
          cp "$GITHUB_WORKSPACE/kout/arch/arm64/boot/Image" AnyKernel3/Image

          cd AnyKernel3
          AK3_NAME="AnyKernel3_Vanilla_AOSP_6.12.23_palaziks-ShiftPorts.zip"
          zip -r "../$AK3_NAME" ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_Vanilla_AOSP_6.12.23_palaziks-ShiftPorts
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel3_Vanilla_AOSP_6.12.23_palaziks-ShiftPorts.zip
